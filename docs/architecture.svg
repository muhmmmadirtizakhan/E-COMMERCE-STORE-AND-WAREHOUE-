<svg width="100%" viewBox="0 0 680 520" role="img" style="max-width: 680px; display: block; margin-inline: auto;">
  <title>AETHERIC system architecture</title>
  <desc>Three-tier architecture showing client, Express server, and five external services</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
    </marker>
  <mask id="imagine-text-gaps-ojlxtb" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="520" fill="white"></rect><rect x="46.000003814697266" y="10.666666984558105" width="38.7286262512207" height="20.666667938232422" fill="black" rx="2"></rect><rect x="203.73439025878906" y="56.5555534362793" width="73.02131652832031" height="22.88888931274414" fill="black" rx="2"></rect><rect x="195.82640075683594" y="75.66667175292969" width="88.6429443359375" height="20.666667938232422" fill="black" rx="2"></rect><rect x="378.248291015625" y="56.5555534362793" width="122.83582305908203" height="22.88888931274414" fill="black" rx="2"></rect><rect x="394.61114501953125" y="75.66667175292969" width="91.1601333618164" height="20.666667938232422" fill="black" rx="2"></rect><rect x="610" y="180.6666717529297" width="38.38323402404785" height="20.666667938232422" fill="black" rx="2"></rect><rect x="46.000003814697266" y="130.6666717529297" width="42.37449264526367" height="20.666667938232422" fill="black" rx="2"></rect><rect x="270.045166015625" y="176.55555725097656" width="139.90972900390625" height="22.88888931274414" fill="black" rx="2"></rect><rect x="202.14584350585938" y="195.6666717529297" width="275.9691162109375" height="20.666667938232422" fill="black" rx="2"></rect><rect x="46.000003814697266" y="278.66668701171875" width="50.815860748291016" height="20.666667938232422" fill="black" rx="2"></rect><rect x="81.87153625488281" y="324.5555725097656" width="60.5804328918457" height="22.88888931274414" fill="black" rx="2"></rect><rect x="69.28472900390625" y="343.66668701171875" width="84.70795440673828" height="20.666667938232422" fill="black" rx="2"></rect><rect x="229.7830047607422" y="324.5555725097656" width="68.76304244995117" height="22.88888931274414" fill="black" rx="2"></rect><rect x="202.09202575683594" y="343.66668701171875" width="124.2114486694336" height="20.666667938232422" fill="black" rx="2"></rect><rect x="317.5017395019531" y="324.5555725097656" width="45.32950973510742" height="22.88888931274414" fill="black" rx="2"></rect><rect x="278.0833435058594" y="343.66668701171875" width="124.30046081542969" height="20.666667938232422" fill="black" rx="2"></rect><rect x="433.06597900390625" y="324.5555725097656" width="54.315616607666016" height="22.88888931274414" fill="black" rx="2"></rect><rect x="422.20660400390625" y="343.66668701171875" width="76.04633331298828" height="20.666667938232422" fill="black" rx="2"></rect><rect x="530.3021240234375" y="324.5555725097656" width="75.72203826904297" height="22.88888931274414" fill="black" rx="2"></rect><rect x="526.6736450195312" y="343.66668701171875" width="83.10626983642578" height="20.666667938232422" fill="black" rx="2"></rect><rect x="46.000003814697266" y="386.6666564941406" width="59.633235931396484" height="20.666667938232422" fill="black" rx="2"></rect><rect x="112.8888931274414" y="418.6666564941406" width="109.82247924804688" height="20.666667938232422" fill="black" rx="2"></rect><rect x="294" y="418.6666564941406" width="120.16163635253906" height="20.666667938232422" fill="black" rx="2"></rect><rect x="494" y="418.6666564941406" width="130.95136260986328" height="20.666667938232422" fill="black" rx="2"></rect><rect x="137.81423950195312" y="478.6666564941406" width="103.96741485595703" height="20.666667938232422" fill="black" rx="2"></rect></mask></defs>

  <!-- ── TIER LABELS ── -->
  <text class="ts" x="40" y="30" text-anchor="middle" transform="rotate(-90,40,30)" style="display:none"></text>

  <!-- ══ CLIENT TIER ══ -->
  <rect x="40" y="30" width="600" height="2" rx="1" fill="var(--color-border-tertiary)"></rect>
  <text class="ts" x="50" y="26">Client</text>

  <g class="node c-purple" onclick="sendPrompt('Tell me more about the AETHERIC storefront')">
    <rect x="160" y="46" width="160" height="52" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="240" y="68" text-anchor="middle" dominant-baseline="central">Storefront</text>
    <text class="ts" x="240" y="86" text-anchor="middle" dominant-baseline="central">HTML · CSS · JS</text>
  </g>

  <g class="node c-purple" onclick="sendPrompt('Tell me more about the admin dashboard')">
    <rect x="360" y="46" width="160" height="52" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="440" y="68" text-anchor="middle" dominant-baseline="central">Admin dashboard</text>
    <text class="ts" x="440" y="86" text-anchor="middle" dominant-baseline="central">Protected route</text>
  </g>

  <!-- CLIENT → SERVER arrows -->
  <line x1="240" y1="98" x2="240" y2="162" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"></line>
  <line x1="440" y1="98" x2="340" y2="162" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"></line>

  <!-- Formspree bypass arrow -->
  <path d="M520 72 Q600 72 600 200 Q600 290 540 310" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"></path>
  <text class="ts" x="614" y="196" text-anchor="start">direct</text>

  <!-- ══ SERVER TIER ══ -->
  <rect x="40" y="150" width="600" height="2" rx="1" fill="var(--color-border-tertiary)"></rect>
  <text class="ts" x="50" y="146">Server</text>

  <g class="node c-teal" onclick="sendPrompt('Explain the Express API server architecture')">
    <rect x="170" y="166" width="340" height="56" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="340" y="188" text-anchor="middle" dominant-baseline="central">Node.js · Express API</text>
    <text class="ts" x="340" y="206" text-anchor="middle" dominant-baseline="central">Auth middleware · REST routes · Webhook handler</text>
  </g>

  <!-- SERVER → SERVICES arrows -->
  <!-- Firebase -->
  <line x1="220" y1="222" x2="120" y2="310" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"></line>
  <!-- Supabase -->
  <line x1="280" y1="222" x2="240" y2="310" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"></line>
  <!-- Stripe -->
  <line x1="340" y1="222" x2="340" y2="310" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"></line>
  <!-- Resend -->
  <line x1="420" y1="222" x2="460" y2="310" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"></line>

  <!-- ══ SERVICES TIER ══ -->
  <rect x="40" y="298" width="600" height="2" rx="1" fill="var(--color-border-tertiary)"></rect>
  <text class="ts" x="50" y="294">Services</text>

  <!-- Firebase -->
  <g class="node c-amber" onclick="sendPrompt('How does Firebase Auth work in AETHERIC?')">
    <rect x="44" y="314" width="136" height="52" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="112" y="336" text-anchor="middle" dominant-baseline="central">Firebase</text>
    <text class="ts" x="112" y="354" text-anchor="middle" dominant-baseline="central">Auth · Storage</text>
  </g>

  <!-- Supabase -->
  <g class="node c-teal" onclick="sendPrompt('What data does Supabase store in AETHERIC?')">
    <rect x="196" y="314" width="136" height="52" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="264" y="336" text-anchor="middle" dominant-baseline="central">Supabase</text>
    <text class="ts" x="264" y="354" text-anchor="middle" dominant-baseline="central">PostgreSQL · Realtime</text>
  </g>

  <!-- Stripe -->
  <g class="node c-purple" onclick="sendPrompt('How does Stripe handle payments in AETHERIC?')">
    <rect x="272" y="314" width="136" height="52" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="340" y="336" text-anchor="middle" dominant-baseline="central">Stripe</text>
    <text class="ts" x="340" y="354" text-anchor="middle" dominant-baseline="central">Payments · Webhooks</text>
  </g>

  <!-- Resend -->
  <g class="node c-gray" onclick="sendPrompt('What emails does Resend send in AETHERIC?')">
    <rect x="392" y="314" width="136" height="52" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="460" y="336" text-anchor="middle" dominant-baseline="central">Resend</text>
    <text class="ts" x="460" y="354" text-anchor="middle" dominant-baseline="central">Order emails</text>
  </g>

  <!-- Formspree -->
  <g class="node c-coral" onclick="sendPrompt('Why does Formspree bypass the Express server?')">
    <rect x="500" y="314" width="136" height="52" rx="8" stroke-width="0.5"></rect>
    <text class="th" x="568" y="336" text-anchor="middle" dominant-baseline="central">Formspree</text>
    <text class="ts" x="568" y="354" text-anchor="middle" dominant-baseline="central">Contact forms</text>
  </g>

  <!-- ══ DATA FLOW LEGEND ══ -->
  <rect x="40" y="406" width="600" height="2" rx="1" fill="var(--color-border-tertiary)"></rect>
  <text class="ts" x="50" y="402">Data flow</text>

  <line x1="60" y1="430" x2="110" y2="430" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"></line>
  <text class="ts" x="118" y="434">Auth · API requests</text>

  <line x1="240" y1="430" x2="290" y2="430" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"></line>
  <text class="ts" x="298" y="434">Server → service calls</text>

  <line x1="440" y1="430" x2="490" y2="430" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"></line>
  <text class="ts" x="498" y="434">Client direct (no server)</text>

  <!-- Stripe webhook return -->
  <path d="M340 366 Q340 450 230 470 Q130 488 180 402" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)" mask="url(#imagine-text-gaps-ojlxtb)"></path>
  <text class="ts" x="190" y="494" text-anchor="middle">webhook callback</text>

</svg>
