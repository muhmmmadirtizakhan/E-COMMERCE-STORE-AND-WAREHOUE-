  <line x1="450" y1="598" x2="450" y2="618" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#ag)"/>

  <rect x="240" y="618" width="420" height="36" rx="8" fill="#082d1f" stroke="#0F6E56" stroke-width="0.8"/>
