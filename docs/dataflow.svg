  <rect x="290" y="1794" width="320" height="36" rx="8" fill="#2a1f04" stroke="#854F0B" stroke-width="0.8"/>
  <text x="450" y="1817" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" font-weight="600" fill="#FAC775">Stripe processes payment</text>
